<div class="zen-cortext-root" id="zen-cortext-root">

    <div class="zc-hero">
        <h2>{{ t:Talk to a }} <span class="accent">{{ t:technical consultant }}</span></h2>
    </div>

    <div class="zc-chat" id="zc-chat">
        <div class="zc-intro-card" id="zc-intro-card" style="opacity:0;animation:none;transition:opacity 180ms ease">
            <div class="zc-intro-top">
                {{ if:has_logo_or_site }}
                <a href="{{ url:intro.site_url_or_hash }}" target="_blank" rel="noopener" class="zc-intro-logo">
                    {{ if:intro.logo_url }}
                    <img src="{{ url:intro.logo_url }}" alt="{{ attr:intro.name }}">
                    {{ /if }}
                </a>
                {{ /if }}
                <div class="zc-intro-meta">
                    <div class="zc-intro-name">{{ intro.name }}</div>
                    <div class="zc-intro-role">{{ intro.role }}</div>
                </div>
            </div>
            <div class="zc-intro-body">{{ raw:intro.body_html }}</div>
            {{ if:intro.site_url }}
            <div class="zc-intro-actions">
                <a href="{{ url:intro.site_url }}" target="_blank" rel="noopener" class="zc-intro-link">
                    {{ intro.site_display }} &#8599;
                </a>
            </div>
            {{ /if }}
        </div>
        <div class="zc-typing" id="zc-typing">
            <div class="zc-typing-bubble"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="zc-input-area">
        <div class="zc-share" id="zc-share" hidden>
            <button type="button" class="zc-share-button" id="zc-share-button" title="{{ t:Copy a link you can use to come back to this conversation later }}">
                <span class="zc-share-icon">🔗</span>
                <span class="zc-share-label">{{ t:Save this conversation }}</span>
            </button>
            <button type="button" class="zc-delete-button" id="zc-delete-button" title="{{ t:Permanently delete this conversation from the server }}">
                <span class="zc-delete-icon">🗑</span>
                <span class="zc-delete-label">{{ t:Delete conversation }}</span>
            </button>
            <button type="button" class="zc-email-button" id="zc-email-button" title="{{ t:Email yourself a copy of this conversation }}">
                <span class="zc-email-icon">✉</span>
                <span class="zc-email-label">{{ t:Email me a copy }}</span>
            </button>
            <span class="zc-share-status" id="zc-share-status" aria-live="polite"></span>
        </div>

        <form class="zc-email-form" id="zc-email-form" hidden>
            <input type="email" id="zc-email-input" class="zc-email-input"
                   placeholder="{{ attr:email_input_placeholder }}" autocomplete="email" required>
            <button type="submit" class="zc-email-submit" id="zc-email-submit">{{ t:Send }}</button>
            <button type="button" class="zc-email-cancel" id="zc-email-cancel">{{ t:Cancel }}</button>
            <span class="zc-email-status" id="zc-email-status" aria-live="polite"></span>
        </form>

        <div class="zc-chips" id="zc-chips" style="display:none;"></div>
        <div class="zc-input-row">
            <textarea id="zc-input" class="zc-input" rows="1" placeholder="{{ attr:input_placeholder }}"></textarea>
            <button type="button" id="zc-mic" class="zc-mic is-idle" style="display:none;" aria-label="{{ t:Record voice message }}">
                <svg class="zc-mic-icon zc-mic-icon-rec"  width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                <svg class="zc-mic-icon zc-mic-icon-stop" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                <svg class="zc-mic-icon zc-mic-icon-up"   width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9" opacity="0.25"/><path d="M21 12a9 9 0 0 0-9-9"/></svg>
            </button>
            <button id="zc-send" class="zc-send">{{ t:Send }}</button>
        </div>
    </div>

</div>

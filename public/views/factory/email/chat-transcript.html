<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:600px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#333;">
    <tr>
        <td style="padding:20px 0 12px 0;border-bottom:1px solid #e5e5e5;">
            <h2 style="margin:0;font-size:18px;color:#646B3A;">
                {{ t:Your conversation with }} {{ site_name }}
            </h2>
            <p style="margin:6px 0 0 0;font-size:12px;color:#888;">{{ sent_at_human }}</p>
        </td>
    </tr>

    {{ each:messages }}
    <tr>
        <td style="padding:14px 0;border-bottom:1px solid #f4f4f4;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:4px;">
                {{ if:is_user }}{{ t:You }}{{ /if }}
                {{ if:is_admin }}{{ sender }}{{ /if }}
                {{ if:is_assistant }}{{ site_name }}{{ /if }}
            </div>
            <div style="font-size:14px;line-height:1.55;white-space:pre-wrap;">{{ content }}</div>
        </td>
    </tr>
    {{ /each }}

    <tr>
        <td style="padding:18px 0;font-size:12px;color:#888;">
            <a href="{{ url:chat_url }}" style="color:#646B3A;text-decoration:none;">
                &#8599; {{ t:Reopen this conversation }}
            </a>
        </td>
    </tr>
</table>
